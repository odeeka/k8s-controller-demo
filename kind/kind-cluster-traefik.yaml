kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  image: kindest/node:v1.34.0
  labels:
    ingress-ready: "true"
  extraPortMappings:
  # Traefik ingress
  - containerPort: 32080
    hostPort: 80
    protocol: TCP
  - containerPort: 32443
    hostPort: 443
    protocol: TCP
  
  # Direct app nodeports
  - containerPort: 30080 # Open for NodePort service
    hostPort: 30080
    protocol: TCP
  - containerPort: 30443 # Open for NodePort service
    hostPort: 30443
    protocol: TCP
- role: worker
- role: worker
networking:
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
