---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: appdeployments.learn.example.com
spec:
  group: learn.example.com
  names:
    kind: AppDeployment
    listKind: AppDeploymentList
    plural: appdeployments
    singular: appdeployment
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Available
          type: integer
          jsonPath: .status.availableReplicas
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: AppDeployment is the Schema for the appdeployments API
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - image
              properties:
                image:
                  description: Container image to run (e.g. nginx:1.25)
                  type: string
                replicas:
                  description: Number of desired pod replicas
                  type: integer
                  format: int32
                  minimum: 0
                  default: 1
                port:
                  description: Container port to expose
                  type: integer
                  format: int32
                  default: 80
            status:
              type: object
              properties:
                phase:
                  type: string
                availableReplicas:
                  type: integer
                  format: int32
