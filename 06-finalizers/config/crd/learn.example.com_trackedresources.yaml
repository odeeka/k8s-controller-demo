---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: trackedresources.learn.example.com
spec:
  group: learn.example.com
  names:
    kind: TrackedResource
    listKind: TrackedResourceList
    plural: trackedresources
    singular: trackedresource
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Message
          type: string
          jsonPath: .spec.message
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: TrackedResource is the Schema for the trackedresources API
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - message
              properties:
                message:
                  description: An arbitrary message representing what this resource tracks
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
