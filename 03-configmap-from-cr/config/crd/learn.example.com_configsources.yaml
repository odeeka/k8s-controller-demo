---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: configsources.learn.example.com
spec:
  group: learn.example.com
  names:
    kind: ConfigSource
    listKind: ConfigSourceList
    plural: configsources
    singular: configsource
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: ConfigMap
          type: string
          jsonPath: .status.managedConfigMap
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: ConfigSource is the Schema for the configsources API
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - data
              properties:
                data:
                  description: Key-value pairs to store in the ConfigMap
                  type: object
                  additionalProperties:
                    type: string
                configMapName:
                  description: Name for the generated ConfigMap (defaults to CR name)
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                managedConfigMap:
                  type: string
